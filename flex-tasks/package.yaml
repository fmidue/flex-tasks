---
name: flex-tasks
version: 0.1
extra-source-files:
  - tasks/defaultConfig.flex
dependencies:
  - autotool-capabilities
  - autotool-capabilities-io-instances
  - base
  - blaze-html
  - containers
  - directory
  - exceptions
  - extra
  - fast-logger
  - filepath
  - ghc
  - hint
  - file-embed
  - flex-tasks-processing
  - mtl
  - MonadRandom
  - output-blocks
  - parsec
  - parsec-numbers
  - QuickCheck
  - SHA
  - shakespeare
  - string-interpolate
  - text
  - transformers
  - utf8-string
  - yesod
  - yesod-core
  - yesod-form
default-extensions:
  - TupleSections
  - OverloadedLabels
  - MultiParamTypeClasses
  - FlexibleInstances
  - TypeApplications
  - ScopedTypeVariables
  - NamedFieldPuns
  - FlexibleContexts
library:
  source-dirs: src
  exposed-modules:
    - FlexTask.Config.Default
    - FlexTask.Config.Types
    - FlexTask.Form
    - FlexTask.Form.Helpers
    - FlexTask.Form.ToHtml
    - FlexTask.Form.Types
    - FlexTask.Form.Util
    - FlexTask.GenUtil
    - FlexTask.InputTypes
    - FlexTask.Interpreter.EvaluationHelper
    - FlexTask.Interpreter.GenerationHelper
    - FlexTask.Interpreter
    - FlexTask.Parser
  ghc-options:
    - -Wall
    - -Widentities
    - -Werror
tests:
  flex-tasks-test:
    main: Spec.hs
    source-dirs:
      - test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -Wall
      - -Widentities
      - -Werror
    dependencies:
      - flex-tasks
      - flex-tasks-processing
      - hspec
      - hspec-parsec
      - quickcheck-instances
      - string-interpolate
      - syb
  flex-tasks-doctest:
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    main: DocTest.hs
    source-dirs:
      - doctest
    dependencies:
      - doctest
      - doctest-discover
      - flex-tasks
      - flex-tasks-processing
